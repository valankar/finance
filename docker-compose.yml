services:
  accounts: &accounts
    image: ${IMAGE}
    container_name: accounts
    init: true
    volumes:
      - ${HOME}/code/accounts:/app/code/accounts
      - ${HOME}/code/ledger:/app/code/ledger
    environment: &environment
      REDIS_HOST: valkey
      SCHWAB_API_KEY: ${SCHWAB_API_KEY}
      SCHWAB_SECRET: ${SCHWAB_SECRET}
      SCHWAB_CALLBACK_URI: ${SCHWAB_CALLBACK_URI}
      FRED_API_KEY: ${FRED_API_KEY}
      BROWSER_USE_API_KEY: ${BROWSER_USE_API_KEY}
    restart: unless-stopped
    networks: &networks
      - caddy
    depends_on:
      - valkey
      - chrome-cdp

  accounts-dev:
    <<: *accounts
    environment:
      <<: *environment
      REDIS_HOST: valkey-dev
    container_name: accounts-dev
    profiles: [ "development" ]
    depends_on:
      - valkey-dev
      - chrome-cdp

  accounts_hourly:
    <<: *accounts
    restart: no
    profiles: [ "scripts" ]
    container_name: accounts_hourly
    command: "/app/code/accounts/finance_hourly.py"

  valkey: &valkey
    image: valkey/valkey
    container_name: valkey
    networks: *networks
    volumes:
      - ${HOME}/code/accounts/web/valkey:/data
    user: "1000:1000"
    restart: unless-stopped
  
  valkey-dev:
    <<: *valkey
    container_name: valkey-dev
    user: "1001:1001"
    profiles: [ "development" ]

  chrome-cdp:
    image: chromedp/headless-shell
    command: ["--disable-gpu"]
    container_name: chrome-cdp
    restart: unless-stopped
    networks: *networks
    ports:
      - "9222:9222"

networks:
  caddy:
    name: caddy
    external: true
